name: 🚀 Build and Deploy to InfinityFree

on:
  push:
    branches:
      - main  # Make sure this matches your branch name (main or master)


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 🛠️ Install and Build
        run: |
          npm install
          npm run build  # This creates the 'dist' folder with your updated title

      - name: 📂 Sync Dist to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/      # ONLY upload the built website
          server-dir: ./htdocs/   # Put it exactly where InfinityFree looks
